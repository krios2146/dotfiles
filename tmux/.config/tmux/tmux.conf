# Shell
set -g default-shell /usr/bin/zsh

# Prefix
set -g prefix C-s
set -g prefix2 C-space
bind C-space send-prefix
bind q source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# Mouse support
set -g mouse on

# Vi mode for copy
set -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# Pane navigation
bind-key h select-pane -L
bind-key j select-pane -U
bind-key k select-pane -D
bind-key l select-pane -R

# Session save/restore keybinds
set -g @resurrect-save 'S'
set -g @resurrect-restore 'R'

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Auto-restore last session on start
set -g @continuum-restore 'on'

# Status bar
set -g status-interval 1
set -g status-style bg=default
set -g status-left " #S: "
set -g status-left-style bg=color8
set -g status-left-length 20
set -g status-right "#[fg=color8]%Y-%m-%d #[fg=default]%H:%M:%S "

# Window status styling
set -g monitor-activity on
set -g monitor-bell on
set -g window-status-activity-style fg=default
set -g window-status-bell-style fg=red
set -g window-status-current-style fg=black,bg=green,bold
set -g window-status-style bg=default,fg=default
set -g window-status-separator ""
set -g automatic-rename-format "#{pane_current_command}"

# Show activity dot and bell icon in inactive windows
set -g window-status-format " #I #W #{?window_activity_flag,#[fg=yellow]● ,}#{?window_bell_flag,#[fg=red]✘ ,}"
set -g window-status-current-format " #I #W "

# Command mode styling
set -g message-style bg=default,fg=default

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
