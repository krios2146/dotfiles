#
#
# unbinding
#
#

# Close windows
unbind = SUPER, W
unbind = CTRL ALT, DELETE

# Control tiling
unbind = SUPER, J
unbind = SUPER, P
unbind = SUPER, T
unbind = SUPER, F
unbind = SUPER CTRL, F
unbind = SUPER ALT, F
unbind = SUPER, O
unbind = SUPER, L

# Move focus with SUPER + arrow keys
unbind = SUPER, LEFT
unbind = SUPER, RIGHT
unbind = SUPER, UP
unbind = SUPER, DOWN

# Switch workspaces with SUPER + [1-9; 0]
unbind = SUPER, code:10
unbind = SUPER, code:11
unbind = SUPER, code:12
unbind = SUPER, code:13
unbind = SUPER, code:14
unbind = SUPER, code:15
unbind = SUPER, code:16
unbind = SUPER, code:17
unbind = SUPER, code:18
unbind = SUPER, code:19

# Move active window to a workspace with SUPER + SHIFT + [1-9; 0]
unbind = SUPER SHIFT, code:10
unbind = SUPER SHIFT, code:11
unbind = SUPER SHIFT, code:12
unbind = SUPER SHIFT, code:13
unbind = SUPER SHIFT, code:14
unbind = SUPER SHIFT, code:15
unbind = SUPER SHIFT, code:16
unbind = SUPER SHIFT, code:17
unbind = SUPER SHIFT, code:18
unbind = SUPER SHIFT, code:19

# Move active window silently to a workspace with SUPER + SHIFT + ALT + [1-9; 0]
unbind = SUPER SHIFT ALT, code:10
unbind = SUPER SHIFT ALT, code:11
unbind = SUPER SHIFT ALT, code:12
unbind = SUPER SHIFT ALT, code:13
unbind = SUPER SHIFT ALT, code:14
unbind = SUPER SHIFT ALT, code:15
unbind = SUPER SHIFT ALT, code:16
unbind = SUPER SHIFT ALT, code:17
unbind = SUPER SHIFT ALT, code:18
unbind = SUPER SHIFT ALT, code:19

# Control scratchpad
unbind = SUPER, S
unbind = SUPER ALT, S

unbind = CTRL + SHIFT, S
unbind = SUPER ALT, S

# TAB between workspaces
unbind = SUPER, TAB
unbind = SUPER SHIFT, TAB
unbind = SUPER CTRL, TAB

# Move workspaces to other monitors
unbind = SUPER SHIFT ALT, LEFT
unbind = SUPER SHIFT ALT, RIGHT
unbind = SUPER SHIFT ALT, UP
unbind = SUPER SHIFT ALT, DOWN

# Swap active window with the one next to it with SUPER + SHIFT + arrow keys
unbind = SUPER SHIFT, LEFT
unbind = SUPER SHIFT, RIGHT
unbind = SUPER SHIFT, UP
unbind = SUPER SHIFT, DOWN

# Cycle through applications on active workspace
unbind = ALT, TAB
unbind = ALT SHIFT, TAB
unbind = ALT, TAB
unbind = ALT SHIFT, TAB

# Resize active window
unbind = SUPER, code:20
unbind = SUPER, code:21
unbind = SUPER SHIFT, code:20
unbind = SUPER SHIFT, code:21

# Scroll through existing workspaces with SUPER + scroll
unbind = SUPER, mouse_down
unbind = SUPER, mouse_up

# Move/resize windows with mainMod + LMB/RMB and dragging
unbind = SUPER, mouse:272
unbind = SUPER, mouse:273

# Groups
unbind = SUPER + ALT, G

# Join groups
unbind = SUPER ALT, LEFT
unbind = SUPER ALT, RIGHT
unbind = SUPER ALT, UP
unbind = SUPER ALT, DOWN

# Navigate a single set of grouped windows
unbind = SUPER ALT, TAB
unbind = SUPER ALT SHIFT, TAB

# Window navigation for grouped windows
unbind = SUPER CTRL, LEFT
unbind = SUPER CTRL, RIGHT

# Scroll through a set of grouped windows with SUPER + ALT + scroll
unbind = SUPER ALT, mouse_down
unbind = SUPER ALT, mouse_up

# Activate window in a group by number
unbind = SUPER ALT, code:10
unbind = SUPER ALT, code:11
unbind = SUPER ALT, code:12
unbind = SUPER ALT, code:13
unbind = SUPER ALT, code:14

# Cycle monitor scaling
unbind = SUPER, Slash

#
#
# binding
#
#

bindd = CTRL + SHIFT, x, Close window, killactive,

bindd = CTRL + SHIFT, MINUS, Full screen, fullscreen, 0

bindd = SUPER, h, Workspace 1, workspace, r~1
bindd = SUPER, j, Workspace 2, workspace, r~2
bindd = SUPER, k, Workspace 3, workspace, r~3
bindd = SUPER, l, Workspace 4, workspace, r~4
bindd = SUPER, SEMICOLON, Workspace 5, workspace, r~5

bindd = SUPER SHIFT, h, Move window to workspace 1, movetoworkspace, r~1
bindd = SUPER SHIFT, j, Move window to workspace 2, movetoworkspace, r~2
bindd = SUPER SHIFT, k, Move window to workspace 3, movetoworkspace, r~3
bindd = SUPER SHIFT, l, Move window to workspace 4, movetoworkspace, r~4
bindd = SUPER SHIFT, SEMICOLON, Move window to workspace 5, movetoworkspace, r~5

bindd = SUPER, LEFT, Move window focus left, movefocus, l
bindd = SUPER, RIGHT, Move window focus right, movefocus, r

bindd = CTRL + SHIFT, g, Toggle window grouping, togglegroup

bindd = CTRL + SHIFT, LEFT, Move workspace to left monitor, movecurrentworkspacetomonitor, l
bindd = CTRL + SHIFT, RIGHT, Move workspace to right monitor, movecurrentworkspacetomonitor, r

bindd = ALT, TAB, Next window in group, changegroupactive, f
bindd = SHIFT, TAB, Previous window in group, changegroupactive, b

bindd = ALT + SHIFT, 1, Switch to group window 1, changegroupactive, 0
bindd = ALT + SHIFT, 2, Switch to group window 2, changegroupactive, 1
bindd = ALT + SHIFT, 3, Switch to group window 3, changegroupactive, 2
bindd = ALT + SHIFT, 4, Switch to group window 4, changegroupactive, 3
